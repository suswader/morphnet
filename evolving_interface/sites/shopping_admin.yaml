agent_hints: >-
  This is the Magento admin panel. Login is required — use the
  credentials provided. After login, close any modal popups that
  appear. The left sidebar has navigation for all admin sections:
  Sales > Orders, Marketing > Reviews, Catalog > Products, etc.
  Use the sidebar navigation rather than the search. Data tables
  support sorting and filtering via column headers and search boxes.
